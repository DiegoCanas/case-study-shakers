apiVersion: apps/v1
kind: Deployment
metadata:
  name: projects-api
  namespace: production
spec:
  replicas: 2
  selector:
    matchLabels:
      app: projects-api
  template:
    metadata:
      labels:
        app: projects-api
    spec:
      containers:
        - name: projects-api
          image: 123456789.dkr.ecr.eu-west-1.amazonaws.com/projects-api:latest
          ports:
            - containerPort: 3000
          env:
            - name: NODE_ENV
              value: "production"
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: database-url-secret
                  key: DATABASE_URL
          livenessProbe:
            httpGet:
              path: /healthz
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /ready
              port: 3000
            initialDelaySeconds: 6
            periodSeconds: 6
          resources:
            requests:
              cpu: "200m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"
---
apiVersion: v1
kind: Service
metadata:
  name: projects-api
  namespace: production
spec:
  type: NodePort
  selector:
    app: projects-api
  ports:
    - port: 80
      targetPort: 3000
