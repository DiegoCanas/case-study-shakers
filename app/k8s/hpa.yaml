apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: projects-api
  namespace: production-shakers
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: projects-api

  minReplicas: 2
  maxReplicas: 5

  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
