apiVersion: apps/v1
kind: Deployment
metadata:
  name: projects-api
  namespace: production-shakers
  labels:
    app: projects-api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: projects-api
  template:
    metadata:
      labels:
        app: projects-api
    spec:
      containers:
        - name: projects-api
          image: projects-api:v1
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3000

          env:
            - name: PORT
              value: "3000"
            - name: NODE_ENV
              value: "production-shakers"

          readinessProbe:
            httpGet:
              path: /ready
              port: 3000
            initialDelaySeconds: 2
            periodSeconds: 5

          livenessProbe:
            httpGet:
              path: /healthz
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 10

          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "250m"
              memory: "256Mi"

          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            allowPrivilegeEscalation: false
